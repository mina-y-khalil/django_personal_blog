{% extends "base.html" %}
{% load static %}



{% block title %}All My Posts{% endblock %}

{% block css_files %}
<link rel="stylesheet" href="{% static 'blog/index.css' %}" />
{% endblock %}

{% block content %}
<section id="all-posts">
    <h2>All Posts</h2>
    <ul>
        {% for post in posts %}
        <li>
            <article class="post">
                <a href="{% url 'post-detail' post.slug %}">
                    <img src="{{ post.image.url }}" alt="{{ post.title }}" />
                    <div class="post__content">
                        <h3>{{ post.title }}</h3>
                        <p>{{ post.excerpt }}</p>
                    </div>
                </a>
            </article>
        </li>
        {% endfor %}

</section>



{%endblock%}
