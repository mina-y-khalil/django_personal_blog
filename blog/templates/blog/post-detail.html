{% extends "base.html" %}
{% load static %}

{% block title %}{{ post.title }}{% endblock %}

{% block css_files %}
<link rel="stylesheet" href="{% static 'blog/post-detail.css' %}" />
<link rel="stylesheet" href="{% static 'blog/index.css' %}" />
{% endblock %}

{% block content %}

<section id="summary">
  <header>
    <h2>{{ post.title }}</h2>
  </header>
  <article>
    {% if post.image %}
      <img src="{{ post.image.url }}" alt="{{ post.title }}" />
    {% else %}
      <img src="{% static 'blog/images/code.jpg' %}" alt="{{ post.title }}" />
    {% endif %}
    <div>
      <time>{{ post.date }}</time>
    </div>
  </article>
</section>

<main>
  <p>{{ post.excerpt }}</p>
  <p>{{ post.content }}</p>
</main>

{% endblock %}
